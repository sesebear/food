name: 12 Train Brussels Model (Python)

on:
  schedule:
    # Weekly retrain — Mondays at 06:00 UTC, after fresh ingest commits.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 12-train-python
  cancel-in-progress: false

jobs:
  train_python:
    name: Train Brussels XGBoost model with Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 12_end

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas xgboost

      - name: Train Brussels model (Python)
        run: python 02_train_model.py

      - name: Upload xgboost-model artifact
        uses: actions/upload-artifact@v4
        with:
          name: xgboost-model-python
          path: |
            12_end/data/modelpy.json
            12_end/data/validationpy.json
          if-no-files-found: error

      - name: Commit updated model files
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 12_end/data/modelpy.json 12_end/data/validationpy.json
          if git diff --cached --quiet; then
            echo "No model changes to commit."
          else
            git commit -m "chore(12_end): retrain modelpy.json via Python cron [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi
