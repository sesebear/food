name: 12 Ingest Brussels Traffic (R)

on:
  schedule:
    # Offset 5 minutes from the Python job to avoid simultaneous commit-back races.
    - cron: "5/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Shared group name with 12-ingest-python so R and Python never run at the
  # same time and race the binary commit-back to traffic.db.
  group: 12-ingest
  cancel-in-progress: false

jobs:
  ingest_r:
    name: Ingest Brussels traffic with R
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 12_end

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies (cached)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::httr2
            any::dplyr
            any::tibble
            any::purrr
            any::lubridate
            any::DBI
            any::RSQLite

      - name: Run Brussels ingest (R)
        run: Rscript 01_ingest_traffic.R

      - name: Commit updated traffic.db (with retries)
        # Re-run the ingest on top of the latest origin/main if the push is
        # rejected. The script is idempotent thanks to
        # ON CONFLICT(metro_id, monitor_id, observed_at) DO NOTHING, so this
        # safely combines our newest API rows with any concurrent commit.
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            git add 12_end/data/traffic.db
            if git diff --cached --quiet; then
              echo "No traffic.db changes to commit (attempt $attempt)."
              exit 0
            fi
            git commit -m "chore(12_end): update traffic.db via R ingest [skip ci]"
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt; resyncing with origin and re-running ingest."
            git reset --hard HEAD~1
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
            ( cd 12_end && Rscript 01_ingest_traffic.R )
            sleep $(( attempt * 3 ))
          done

          echo "Exhausted retries pushing traffic.db." >&2
          exit 1
