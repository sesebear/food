name: 12 Ingest Brussels Traffic (Python)

on:
  schedule:
    # Every 15 minutes — Brussels API publishes 1-minute traverse counts.
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 12-ingest-python
  cancel-in-progress: false

jobs:
  ingest_python:
    name: Ingest Brussels traffic with Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 12_end

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Brussels ingest (Python)
        run: python 01_ingest_traffic.py

      - name: Commit updated traffic.db
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 12_end/data/traffic.db
          if git diff --cached --quiet; then
            echo "No traffic.db changes to commit."
          else
            git commit -m "chore(12_end): update traffic.db via Python ingest [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi
