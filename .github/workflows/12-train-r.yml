name: 12 Train Brussels Model (R)

on:
  schedule:
    # Weekly retrain — Mondays at 06:30 UTC (offset 30 min from the Python job
    # so they don't race the commit-back).
    - cron: "30 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Shared group name with 12-train-python so R and Python retraining never
  # run at the same time and race the commit-back to model files.
  group: 12-train
  cancel-in-progress: false

jobs:
  train_r:
    name: Train Brussels XGBoost model with R
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 12_end

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies (cached)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::DBI
            any::RSQLite
            any::dplyr
            any::lubridate
            any::xgboost
            any::jsonlite

      - name: Train Brussels model (R)
        run: Rscript 02_train_model.R

      - name: Upload xgboost-model artifact
        uses: actions/upload-artifact@v4
        with:
          name: xgboost-model-r
          path: |
            12_end/data/modelr.json
            12_end/data/validationr.json
          if-no-files-found: error

      - name: Commit updated model files (with retries)
        # If origin/main moved during the run (e.g. a fresh ingest commit
        # landed), re-sync to the latest tip and retrain on top of it before
        # pushing again.
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5; do
            git add 12_end/data/modelr.json 12_end/data/validationr.json
            if git diff --cached --quiet; then
              echo "No model changes to commit (attempt $attempt)."
              exit 0
            fi
            git commit -m "chore(12_end): retrain modelr.json via R cron [skip ci]"
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected on attempt $attempt; resyncing with origin and re-training."
            git reset --hard HEAD~1
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
            ( cd 12_end && Rscript 02_train_model.R )
            sleep $(( attempt * 3 ))
          done

          echo "Exhausted retries pushing model files." >&2
          exit 1
